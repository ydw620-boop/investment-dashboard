name: 매일 데이터 수집 & 배포

on:
  schedule:
    - cron: '35 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pykrx requests pandas numpy

      - name: 데이터 수집
        run: python collect_data.py
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}

      - name: 데이터 파일을 웹 폴더에 복사
        run: cp dashboard_data.json data/dashboard_data.json

      - name: 변경사항 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json
          git diff --staged --quiet || git commit -m "📊 데이터 업데이트 $(date +'%Y-%m-%d %H:%M')"
          git push
